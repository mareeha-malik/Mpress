{% extends 'base.html' %}
{% block title %}Delete Post{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto py-12">
  <div class="doodle-card relative p-7 text-center" style="background: var(--paper);">
    <div class="washi-corner" style="background:#ffd9d9;"></div>
    <div class="text-5xl mb-3">🗑️</div>
    <h2 class="text-2xl font-doodle font-bold squiggle-underline" style="color:var(--ink);">Delete this post?</h2>
    <p class="mt-4 text-gray-700">
      Are you sure you want to delete <span class="font-semibold">"{{ object.title }}"</span>? This can't be undone — no take-backsies! 🌷
    </p>
    <form method="post" class="mt-6 flex items-center justify-center gap-3">
      {% csrf_token %}
      <button class="doodle-btn px-5 py-2.5 inline-flex items-center gap-2" style="background:#ffd9d9;">
        <i class="fa-solid fa-trash"></i>Yes, delete it
      </button>
      <a href="{% url 'dashboard' %}" class="doodle-btn px-5 py-2.5 bg-white">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
